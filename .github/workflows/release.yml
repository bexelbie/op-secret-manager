name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # Required to create a release and upload assets
  packages: read  # Optional, only needed if you're accessing packages

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25" # Use the Go version you're developing with

      - name: Build for Linux
        run: |
          VERSION="${{ github.ref_name }}"
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=${VERSION}" -trimpath -o op-secret-manager-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=${VERSION}" -trimpath -o op-secret-manager-linux-arm64 .

      - name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            op-secret-manager-linux-amd64
            op-secret-manager-linux-arm64

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Release Assets
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: binaries

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --notes-from-tag binaries/*
        env:
          GH_TOKEN: ${{ github.token }}
